services:
  - type: web
    name: cb-granollers
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Lo introduces manualmente en el dashboard de Render
      - key: SESSION_SECRET
        generateValue: true  # Render genera un valor aleatorio automáticamente
      - key: PORT
        value: 3000
